<style>
:root {
  --primary:#0b3d91;
}

body {
  font-family:Poppins, sans-serif;
  margin:0;
  background:linear-gradient(to right,#fdfbfb,#ebedee);
  color:#222;
}

/* Header */
header {
  background:#fff;
  border-bottom:1px solid #ddd;
  padding:1rem 5vw;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo1 { display:flex; gap:1rem; align-items:center; }
.logo-img { width:48px;height:48px;border-radius:6px;object-fit:cover; }

/* Breadcrumb */
.breadcrumb-nav{
  background:linear-gradient(to right,#eef3ff,#fff3fb);
  margin:1rem 5vw;
  padding:1rem 1.3rem;
  border-radius:12px;
  font-size:.9rem;
  display:flex;
  gap:.4rem;
}
.breadcrumb-nav a{color:var(--primary);text-decoration:none;font-weight:600;}
.breadcrumb-nav span{color:#666;}
.current{color:#333;font-weight:700;}

/* Page Title */
.page-title{
  text-align:center;
  color:var(--primary);
  margin:1.5rem 0 .5rem;
}

/* Scroll container */
.content-wrapper{
  max-width:1100px;
  margin:auto;
  padding:1rem 5vw 3rem;
}

/* Horizontal Detail Card */
.detail-card{
  display:flex;
  gap:1.2rem;
  background:#fff;
  border-radius:14px;
  padding:1.2rem;
  box-shadow:0 8px 18px rgba(0,0,0,.08);
  margin-bottom:1.1rem;
  align-items:center;
}

.detail-img{
  width:95px;
  height:95px;
  border-radius:12px;
  object-fit:cover;
  border:2px solid var(--primary);
  flex-shrink:0;
}

.detail-card h3{margin:0 0 .4rem;color:var(--primary);}
.detail-card p{margin:0;color:#444;line-height:1.6;font-size:.95rem;}

footer{

  text-align:center;

const data = ministries[id];

  document.getElementById("pageTitle").innerText = "Ministry Not Found";
} else {
  document.getElementById("pageTitle").innerText = data.name;
  document.getElementById("breadcrumbName").innerText = data.name;

  const container = document.getElementById("detailsContainer");
  data.cards.forEach(item=>{
    container.innerHTML += `
      <div class="detail-card">
        <img src="${item.img}" class="detail-img">
        <div>
